name: Validate Documentation

on:
  push:
    branches: main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mint
        run: npm install -g mint

      - name: Validate
        run: mint validate
